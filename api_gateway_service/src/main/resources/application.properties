spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/teacherSvc/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/teacherSvc/(?<segment>.*), /${segment}

# SUBJECT SERVICE
spring.cloud.gateway.server.webflux.routes[3].id=subject-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/subjectSvc/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/subjectSvc/(?<segment>.*), /${segment}

# GRADE SERVICE
spring.cloud.gateway.server.webflux.routes[4].id=grade-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/gradeSvc/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/gradeSvc/(?<segment>.*), /${segment}

# PAYMENT SERVICE
spring.cloud.gateway.server.webflux.routes[5].id=payment-service
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8085
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/paymentSvc/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/paymentSvc/(?<segment>.*), /${segment}

#rate limiting, artinya = maksimal 5 request per 30 detik
max_requests=100
time_window_seconds=30

jwt.secret=ikmal-fauzaeni-secret-key-for-school-microservice-2026
