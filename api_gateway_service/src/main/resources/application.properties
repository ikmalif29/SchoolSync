spring.application.name=api_gateway_service

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

#port API Gateway
server.port=8098

# AUTH SERVICE
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8086
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/authSvc/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/authSvc/(?<segment>.*), /${segment}

# STUDENT SERVICE
spring.cloud.gateway.server.webflux.routes[1].id=student-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/studentSvc/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/studentSvc/(?<segment>.*), /${segment}

# TEACHER SERVICE
